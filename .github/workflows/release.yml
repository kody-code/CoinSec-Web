name: Release Web & APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm build

      - name: Package web-dist
        run: zip -r coinsec-web-${{ github.ref_name }}.zip dist/

      - name: Sync web assets to Android
        run: pnpm exec cap sync

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure release signing
        run: |
          cat > android/app/release-signing.gradle << 'GRADLE'
          android {
              signingConfigs {
                  release {
                      storeFile file('release.keystore')
                      storePassword System.getenv("STORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE
          grep -q "release-signing" android/app/build.gradle || echo "apply from: 'release-signing.gradle'" >> android/app/build.gradle

      - name: Build APK
        run: |
          cd android && ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk ../coinsec-app-${{ github.ref_name }}.apk

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: "版本 ${{ github.ref_name }}"
          files: |
            coinsec-web-${{ github.ref_name }}.zip
            coinsec-app-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
